name: Smooth VNC Mobile Emulator Link (Android 9)
on: [workflow_dispatch]

jobs:
  launch-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Run a lightweight Android 9 image on an ultra low resolution profile
      - name: Run Docker Android
        run: |
          docker run -d -p 6080:6080 -p 5900:5900 \
            -e EMULATOR_DEVICE="Nexus 4" \
            -e SCREEN_WIDTH=480 \
            -e SCREEN_HEIGHT=800 \
            -e WEB_VNC=true \
            --device /dev/kvm \
            --name android-container \
            budtmo/docker-android:emulator_9.0

      # 2. Boot Ngrok using TCP protocol for real-time mobile app streaming
      - name: Start Ngrok TCP Tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"
          ngrok tcp 5900 --log=stdout > ngrok.log &
          
          sleep 5
          
          echo "============================================="
          echo "YOUR ULTRA-FAST VNC ADDRESS IS READY:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "============================================="
          
          sleep 3600
