name: Live Mobile Emulator Link
on: [workflow_dispatch]

jobs:
  launch-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Start a lightweight Nexus 5 running Android 14
      - name: Run Docker Android
        run: |
          docker run -d -p 6080:6080 \
            -e EMULATOR_DEVICE="Nexus 5" \
            -e WEB_VNC=true \
            --device /dev/kvm \
            --name android-container \
            budtmo/docker-android:emulator_14.0

      # 2. Install and launch Ngrok directly via bash script
      - name: Start Ngrok Tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"
          ngrok http 6080 --log=stdout > ngrok.log &
          
          sleep 5
          
          echo "============================================="
          echo "YOUR LIVE ANDROID 14 EMULATOR IS READY:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "============================================="
          
          sleep 3600
